<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GreenWheels</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <!-- Твоя новая иконка для рабочего стола -->
    <link rel="apple-touch-icon" href="https://i.ibb.co/G3nxLXPb/IMG-0605.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            margin: 0; padding: 0; background: #f4f4f4;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header { margin-top: 3rem; text-align: center; }
        /* Стиль для логотипа вверху страницы */
        .logo-img { 
            width: 150px; 
            border-radius: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        .card {
            background: #fff; border-radius: 35px; padding: 2.5rem 1.5rem;
            margin: 1.5rem 0; width: 85%; max-width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;
        }
        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 56px; margin: 12px 0;
            font-size: 1.1rem; font-weight: 600; border-radius: 16px;
            text-decoration: none; transition: 0.2s;
        }
        .main-action { background: #0088cc; color: #fff; }
        .outline { background: #fff; color: #34c759; border: 2px solid #34c759; }
    </style>
</head>
<body>

<header>
    <!-- Логотип внутри приложения -->
    <img src="https://i.ibb.co/G3nxLXPb/IMG-0605.jpg" alt="GreenWheels" class="logo-img">
</header>

<div class="card">
    <a href="tg://resolve?domain=arenda_velo2_bot" class="btn main-action">Заказать в Telegram</a>
    <a href="tel:+79236514917" class="btn outline">Позвонить нам</a>
</div>

</body>
</html>
