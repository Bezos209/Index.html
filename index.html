<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аренда Курьера</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">

    <style>
        body {
            margin: 0; padding: 0; background: #f4f4f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header { margin-top: 4.5rem; text-align: center; }
        .logo-text { font-weight: 800; font-size: 1.7rem; color: #1c1c1e; letter-spacing: -0.5px; }
        
        .card {
            background: #ffffff; border-radius: 35px; padding: 2.5rem 1.5rem;
            margin: 2.5rem 0; width: 85%; max-width: 360px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.07); text-align: center;
        }
        h2 { margin: 0 0 2rem 0; font-size: 1.4rem; font-weight: 700; color: #1c1c1e; }
        
        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 60px; margin: 14px 0;
            font-size: 1.15rem; font-weight: 600; border-radius: 18px;
            text-decoration: none; transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        
        .main-action { 
            background: #0088cc; color: #ffffff; 
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.3);
        }
        
        .outline-phone {
            background: #ffffff; color: #34c759;
            border: 2px solid #34c759;
        }

        .apple-btn { 
            background: #1c1c1e; color: #ffffff; 
            margin-top: 25px; height: 50px; font-size: 0.95rem;
        }

        .icon { margin-right: 12px; font-size: 1.4rem; }
        .divider { 
            margin-top: 30px; padding-top: 20px; 
            border-top: 1px solid #f0f0f0; 
            color: #8e8e93; font-size: 0.85rem; 
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">Аренда Курьера 📦</div>
</header>

<div class="card">
    <h2>Оформить заказ</h2>
    
    <!-- Ссылка на вашего основного рабочего бота -->
    <a href="tg://resolve?domain=arenda_kuriera_bot" class="btn main-action">
        <span class="icon">✈️</span> Заказать в Telegram
    </a>
    
    <!-- Кнопка с вашим телефоном -->
    <a href="tel:+79236514917" class="btn outline-phone">
        <span class="icon">📞</span> Позвонить нам
    </a>
    
    <div class="divider">Для курьеров</div>
    
    <a href="tg://resolve?domain=arenda_kuriera_bot" class="btn apple-btn">
        <span class="icon"></span> Личный кабинет
    </a>
</div>

</body>
</html>
