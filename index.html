<script>
    const t1 = '8279649835:AAFxOHdMWISqNaQ';
    const t2 = 'AdFayAH81oVZyJ-kqWnI';
    const BOT_TOKEN = t1 + t2;
    const CHAT_ID = '-1003953279998';

    function openPanel(id) {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        window.scrollTo(0, 0);
    }

    function closeAll() {
        const panels = document.getElementsByClassName('form-panel');
        for (let p of panels) p.style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
    }

    async function sendMsg(text) {
        const url = `https://telegram.org{BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;
        try {
            const response = await fetch(url);
            const result = await response.json();
            if (result.ok) {
                alert('✅ Заявка отправлена в группу!');
            } else {
                alert('❌ Ошибка Telegram: ' + result.description);
            }
        } catch (e) {
            alert('❌ Ошибка сети: проверьте интернет');
        }
        closeAll();
    }

    async function sendReg() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const photoInput = document.getElementById('reg-photo');
        let caption = `📝 *РЕГИСТРАЦИЯ*\n👤 ФИО: ${name}\n📞 Тел: ${phone}`;
        
        if (photoInput.files.length > 0) {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('caption', caption);
            fd.append('photo', photoInput.files[0]);
            
            try {
                const res = await fetch(`https://telegram.org{BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                const result = await res.json();
                if (result.ok) alert('✅ Данные и фото отправлены!');
                else alert('❌ Ошибка фото: ' + result.description);
            } catch (e) { alert('❌ Ошибка сети при отправке фото'); }
        } else {
            await sendMsg(caption);
        }
        closeAll();
    }

    async function sendService() {
        const task = document.getElementById('serv-task').value;
        const date = document.getElementById('serv-date').value;
        const time = document.getElementById('serv-time').value;
        if (!task || !date) { alert('Заполните описание и дату'); return; }
        await sendMsg(`🛠 *СЕРВИС*\n🔧 Что: ${task}\n📅 Дата: ${date}\n⏰ Время: ${time}`);
    }
</script>
