<script>
    const BT = '8279649835:AAFxOHdMWISqNaQ' + 'AdFayAH81oVZyJ-kqWnI';
    const CI = '-1003953279998';

    function openP(id) {
        document.getElementById('main-ui').style.display = 'none';
        document.querySelectorAll('.container.panel').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        window.scrollTo(0,0);
    }

    function closeP() {
        document.querySelectorAll('.container.panel').forEach(p => p.style.display = 'none');
        document.getElementById('main-ui').style.display = 'block';
    }

    async function sendT(txt) {
        // Используем метод 'keepalive' и упрощенный запрос для обхода блокировок сети
        const url = `https://telegram.org{BT}/sendMessage?chat_id=${CI}&text=${encodeURIComponent(txt)}&parse_mode=Markdown`;
        
        try {
            const res = await fetch(url, { mode: 'no-cors' });
            // В режиме no-cors мы не получим ответ от ТГ, но сообщение уйдет
            alert('✅ Заявка отправлена! Проверьте группу.');
        } catch(e) { 
            alert('❌ Ошибка сети. Попробуйте еще раз.'); 
        }
        closeP();
    }

    async function sendR() {
        const n = document.getElementById('r-name').value;
        const p = document.getElementById('r-phone').value;
        const photoInput = document.getElementById('r-photo');
        
        if(!n || !p) { alert('Заполните Имя и Телефон'); return; }
        let msg = `📝 *РЕГИСТРАЦИЯ*\n👤 Имя: ${n}\n📞 Тел: ${p}`;

        if (photoInput.files.length > 0) {
            const fd = new FormData();
            fd.append('chat_id', CI);
            fd.append('caption', msg);
            fd.append('photo', photoInput.files[0]);
            
            try {
                await fetch(`https://telegram.org{BT}/sendPhoto`, { method: 'POST', body: fd, mode: 'no-cors' });
                alert('✅ Данные отправлены!');
            } catch (e) { alert('❌ Ошибка при отправке фото'); }
        } else {
            sendT(msg);
        }
        closeP();
    }

    function sendS() {
        const t = document.getElementById('s-task').value;
        const d = document.getElementById('s-date').value;
        if(!t || !d) { alert('Укажите детали сервиса'); return; }
        sendT(`🛠 *СЕРВИС*\n🔧 Работа: ${t}\n📅 Дата: ${d}`);
    }
</script>
