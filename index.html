<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аренда Курьера</title>
    <!-- Mobile viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <!-- PWA‑режим для iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            font-family: Arial, Helvetica, sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }
        header {
            margin-top: 2rem;
            text-align: center;
        }
        header .logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        header .logo svg {
            width: 24px;
            height: 24px;
            margin-left: 0.5rem;
        }
        .card {
            background: #fff;
            border-radius: 30px;
            padding: 2rem 1rem;
            margin: 2rem 0;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card h2 {
            margin: 0 0 1.5rem 0;
            font-size: 1.3rem;
            color: #000;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.8rem 0;
            margin: 0.4rem 0;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn svg {
            margin-right: 0.5rem;
            width: 20px;
            height: 20px;
        }
        .apple   { background:#000; color:#fff; }
        .google  { background:#e0e0e0; color:#000; }
        .phone,
        .email,
        .telegram {
            background:#fff;
            color:#7ED321;
            border:1px solid #7ED321;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        Аренда Курьера
        <!-- простой SVG‑значок (транспорт) -->
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm4 0h10v-2H7v2zm0-4h10v-2H7v2zm0-4h10V7H7v2z"/>
        </svg>
    </div>
</header>

<div class="card">
    <h2>Войти через</h2>
    <a href="#" class="btn apple">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12c0 6.627 5.373 12 12 12s12-5.373 12-12C24 5.373 18.627 0 12 0z"/></svg>
        Apple
    </a>
    <a href="#" class="btn google">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1h-9.35v2.8h5.4c-.23 1.5-1.37 2.5-2.85 2.5-1.73 0-3.15-1.44-3.15-3.2s1.42-3.2 3.15-3.2c.82 0 1.5.28 2 .74l1.5-1.5c-.97-.89-2.24-1.44-3.5-1.44-3.42 0-6.2 2.78-6.2 6.2s2.78 6.2 6.2 6.2c3.56 0 5.96-2.5 5.96-6.04 0-.43-.04-.78-.1-1.09z"/></svg>
        Google
    </a>
    <a href="#" class="btn phone">Телефон</a>
    <a href="#" class="btn email">E‑mail</a>
    <a href="#" class="btn telegram">Telegram</a>
</div>

</body>
</html>
