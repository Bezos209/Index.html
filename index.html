<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аренда Курьера PWA</title>
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-bg: #F2F2F7;
            --card-bg: #FFFFFF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--apple-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; }
        .header { text-align: center; margin-bottom: 30px; }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border-radius: 15px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-client { background-color: var(--apple-blue); color: white; }
        .btn-courier { background-color: #34C759; color: white; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-size: 14px;
            font-weight: 500;
        }
        .section-title { font-size: 20px; font-weight: 700; margin-top: 30px; width: 100%; }
        input, select, textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box;
        }
        #registration-form, #service-form { display: none; background: white; padding: 20px; border-radius: 20px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📦 Аренда Курьера</h1>
    </div>

    <!-- БЛОК КЛИЕНТА -->
    <a href="tg://resolve?domain=arenda_velo2_bot" class="btn btn-client">🙋‍♂️ Клиентам: Заказать</a>

    <div class="section-title">🚲 Курьерам</div>
    
    <div class="grid">
        <div class="card" onclick="showForm('registration-form')">📝 Регистрация</div>
        <div class="card" onclick="alert('Каталог в разработке')">🔋 Аренда</div>
        <div class="card" onclick="alert('Магазин в разработке')">⚙️ Запчасти</div>
        <div class="card" onclick="showForm('service-form')">🛠 Сервис</div>
    </div>

    <!-- ФОРМА РЕГИСТРАЦИИ -->
    <div id="registration-form">
        <h3>Анкета курьера</h3>
        <input type="text" id="reg-name" placeholder="ФИО">
        <input type="tel" id="reg-phone" placeholder="+7 (999) 000-00-00">
        <label>Фото (селфи):</label>
        <input type="file" id="reg-photo" accept="image/*" capture="user">
        <button class="btn btn-courier" onclick="sendReg()">Отправить</button>
    </div>

    <!-- ФОРМА СЕРВИСА -->
    <div id="service-form">
        <h3>Запись в сервис</h3>
        <textarea id="service-task" placeholder="Что нужно починить?"></textarea>
        <input type="date" id="service-date">
        <select id="service-time">
            <option value="10:00">10:00</option>
            <option value="12:00">12:00</option>
            <option value="14:00">14:00</option>
            <option value="16:00">16:00</option>
            <option value="18:00">18:00</option>
        </select>
        <button class="btn btn-courier" onclick="sendService()">Записаться</button>
    </div>
</div>

<script>
    const t1 = '8279649835:AAFxOHdMWISqNaQ';
    const t2 = 'AdFayAH81oVZyJ-kqWnI';
    const BOT_TOKEN = t1 + t2;
    const CHAT_ID = '-1003953279998';


    function showForm(id) {
        document.getElementById('registration-form').style.display = 'none';
        document.getElementById('service-form').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    async function sendReg() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const photo = document.getElementById('reg-photo').files[0];

        let text = `📝 **НОВАЯ РЕГИСТРАЦИЯ**\n👤 Имя: ${name}\n📞 Тел: ${phone}`;
        
        if (photo) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('caption', text);
            formData.append('photo', photo);
            await fetch(`https://telegram.org{BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        } else {
            await fetch(`https://telegram.org{BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        }
        alert('Заявка отправлена!');
        location.reload();
    }

    async function sendService() {
        const task = document.getElementById('service-task').value;
        const date = document.getElementById('service-date').value;
        const time = document.getElementById('service-time').value;

        let text = `🛠 **ЗАПИСЬ В СЕРВИС**\n🔧 Работа: ${task}\n📅 Дата: ${date}\n⏰ Время: ${time}`;
        
        await fetch(`https://telegram.org{BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        alert('Вы записаны!');
        location.reload();
    }
</script>

</body>
</html>
