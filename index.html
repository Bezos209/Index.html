<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аренда Курьера</title>
    <style>
        :root { --blue: #007AFF; --bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .container { width: 100%; max-width: 400px; margin: 0 auto; }
        .btn { display: block; width: 100%; padding: 16px; margin: 10px 0; border-radius: 14px; border: none; font-size: 17px; font-weight: 600; cursor: pointer; color: white; text-decoration: none; box-sizing: border-box; }
        .btn-client { background: var(--blue); }
        .btn-courier { background: #34C759; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-weight: 700; cursor: pointer; }
        .panel { display: none; background: white; padding: 20px; border-radius: 20px; margin-top: 10px; text-align: left; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <h1>📦 Аренда Курьера</h1>
    <a href="tg://resolve?domain=arenda_velo2_bot" class="btn btn-client">🙋‍♂️ Клиентам: Заказать</a>
    
    <h2 style="font-size: 18px; margin-top: 30px;">🚲 Курьерам</h2>
    <div class="grid">
        <div class="card" onclick="openP('reg-p')">📝 Рега</div>
        <div class="card" onclick="openP('rent-p')">🔋 Аренда</div>
        <div class="card" onclick="openP('parts-p')">⚙️ Части</div>
        <div class="card" onclick="openP('serv-p')">🛠 Сервис</div>
    </div>
</div>

<div class="container panel" id="reg-p">
    <h3>Регистрация</h3>
    <input type="text" id="r-name" placeholder="ФИО">
    <input type="tel" id="r-phone" placeholder="Телефон">
    <button class="btn btn-courier" onclick="sendR()">Отправить</button>
    <button class="btn" style="background:#8e8e93" onclick="closeP()">Назад</button>
</div>

<div class="container panel" id="rent-p">
    <h3>Аренда на неделю</h3>
    <div style="padding:10px 0; border-bottom:1px solid #eee">
        <b>Минако Монстер про</b><br>
        <select id="m-var"><option value="1 АКБ">1 АКБ — 2800₽</option><option value="2 АКБ">2 АКБ — 3200₽</option></select>
        <button class="btn btn-courier" onclick="sendT('Аренда: Минако ' + document.getElementById('m-var').value)">Бронь</button>
    </div>
    <div style="padding:10px 0;">
        <b>Вен Бокс У3</b> (3500₽)<br>
        <button class="btn btn-courier" onclick="sendT('Аренда: Вен Бокс У3')">Бронь</button>
    </div>
    <button class="btn" style="background:#8e8e93" onclick="closeP()">Назад</button>
</div>

<div class="container panel" id="parts-p">
    <h3>Запчасти</h3>
    <div style="padding:10px 0; border-bottom:1px solid #eee">Колодки — 234₽ <button onclick="sendT('Запчасть: Колодки')">Купить</button></div>
    <div style="padding:10px 0;">Ручка газа — 813₽ <button onclick="sendT('Запчасть: Ручка газа')">Купить</button></div>
    <button class="btn" style="background:#8e8e93; margin-top:10px;" onclick="closeP()">Назад</button>
</div>

<div class="container panel" id="serv-p">
    <h3>Запись в сервис</h3>
    <textarea id="s-task" placeholder="Что сломалось?"></textarea>
    <input type="date" id="s-date">
    <button class="btn btn-courier" onclick="sendS()">Записаться</button>
    <button class="btn" style="background:#8e8e93" onclick="closeP()">Назад</button>
</div>

<script>
    const BT = '8279649835:AAFxOHdMWISqNaQ' + 'AdFayAH81oVZyJ-kqWnI';
    const CI = '-1003953279998';

    function openP(id) {
        document.getElementById('main-ui').style.display = 'none';
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function closeP() {
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        document.getElementById('main-ui').style.display = 'block';
    }

    async function sendT(txt) {
        const url = `https://telegram.org{BT}/sendMessage?chat_id=${CI}&text=${encodeURIComponent(txt)}`;
        try {
            await fetch(url, {mode: 'no-cors'});
            alert('✅ Заявка ушла!');
        } catch(e) { alert('Ошибка сети'); }
        closeP();
    }

    function sendR() {
        const n = document.getElementById('r-name').value;
        const p = document.getElementById('r-phone').value;
        sendT(`📝 РЕГА: ${n}, тел: ${p}`);
    }

    function sendS() {
        const t = document.getElementById('s-task').value;
        const d = document.getElementById('s-date').value;
        sendT(`🛠 СЕРВИС: ${t}, дата: ${d}`);
    }
</script>
</body>
</html>
