<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аренда Курьера</title>
    <!-- Мета-теги для мобильных устройств и PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }
        header {
            margin-top: 4rem;
            text-align: center;
        }
        .logo-text {
            font-weight: 800;
            font-size: 1.6rem;
            color: #222;
            letter-spacing: -0.5px;
        }
        .card {
            background: #fff;
            border-radius: 35px;
            padding: 2.5rem 1.5rem;
            margin: 2.5rem 0;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }
        .card h2 {
            margin: 0 0 2rem 0;
            font-size: 1.4rem;
            font-weight: 700;
            color: #000;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 52px;
            margin: 12px 0;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.1s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        /* Цвета кнопок */
        .apple { background: #000; color: #fff; }
        .google { background: #f2f2f2; color: #000; border: 1px solid #e5e5e5; }
        .outline {
            background: #fff;
            color: #7ED321;
            border: 1.5px solid #7ED321;
        }
        .icon {
            margin-right: 10px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">Аренда Курьера 📦</div>
</header>

<div class="card">
    <h2>Войти через</h2>
    
    <a href="#" class="btn apple">
        <span class="icon"></span> Apple
    </a>
    
    <a href="#" class="btn google">
        <span class="icon">G</span> Google
    </a>
    
    <a href="tel:+79000000000" class="btn outline">
        <span class="icon">📞</span> Телефон
    </a>
    
    <a href="mailto:support@example.com" class="btn outline">
        <span class="icon">✉️</span> E-mail
    </a>
    
    <a href="https://t.me" class="btn outline">
        <span class="icon">✈️</span> Telegram
    </a>
</div>

</body>
</html>
